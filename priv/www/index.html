<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ArbiGuard</title>
  <style>
    body{margin:0;background:#eef2f6;color:#102033;font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif}
    header{background:#111b27;color:white;padding:18px 28px}
    main{padding:20px 28px}.panel{background:white;border:1px solid #d7e0ea;border-radius:8px;padding:18px;margin-bottom:18px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:center}.actions{display:flex;gap:10px;flex-wrap:wrap}
    button{border:0;border-radius:7px;padding:11px 16px;font-weight:700;cursor:pointer;background:#e8eef5;color:#102033}.primary{background:#2563eb;color:white}.danger{background:#fee2e2;color:#991b1b}
    .status{margin-top:12px;padding:10px 12px;border-radius:6px;background:#eaf2ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .grid{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:12px}.card{border:1px solid #d7e0ea;border-radius:8px;padding:12px;background:#fbfdff}.label{font-size:13px;color:#63758a}.value{font-size:22px;font-weight:800;margin-top:6px}
    .form{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:12px;margin-top:14px}label{display:block;font-size:13px;color:#52667c;margin-bottom:5px}input,select{width:100%;box-sizing:border-box;border:1px solid #cfd9e5;border-radius:7px;padding:10px 11px;font-size:14px}
    .table-wrap{overflow:auto;border-top:1px solid #d7e0ea;margin-top:14px}table{width:100%;border-collapse:collapse;min-width:960px}th,td{padding:10px 11px;border-bottom:1px solid #d7e0ea;text-align:left;white-space:nowrap}th{color:#52667c;font-size:13px;background:#fbfdff}
    .pos{color:#059669}.neg{color:#dc2626}.warn{color:#b45309}.muted{color:#6b7280}.tabs{display:flex;gap:8px;margin-top:10px}.tabs button.active{background:#2563eb;color:white}
  </style>
</head>
<body>
  <header><h1>ArbiGuard</h1></header>
  <main>
    <section class="panel">
      <div class="top">
        <div><h2>资金费 / 价差套利</h2><div class="muted">包含 ETS 扫描、模拟账户、实盘账户、开仓执行进程、平仓执行进程和 WebSocket 状态。</div></div>
        <div class="actions"><button class="primary" onclick="scanOnce()">扫描一次</button><button onclick="refreshAll()">刷新</button><button class="danger" onclick="resetPaper()">重置模拟盘</button></div>
      </div>
      <div id="status" class="status">页面已加载。</div>
      <div class="form">
        <div><label>账户模式</label><select id="account_mode"><option value="paper">模拟盘</option><option value="live">实盘</option></select></div>
        <div><label>本金 USDT</label><input id="capital_usdt" value="10000"></div>
        <div><label>单笔名义仓位 USDT</label><input id="execution_notional_usdt" value="200"></div>
        <div><label>单币最大仓位比例</label><input id="max_position_pct" value="0.1"></div>
        <div><label>最低资金费差</label><input id="min_funding_rate" value="0.0003"></div>
        <div><label>最低价格差</label><input id="min_price_gap_rate" value="0.002"></div>
        <div><label>最大基差</label><input id="max_basis_rate" value="0.02"></div>
        <div><label>最低预期利润 USDT</label><input id="min_execution_profit_usdt" value="5"></div>
        <div><label>展示数量</label><input id="limit" value="30"></div>
      </div>
    </section>
    <section class="panel"><h2>总览</h2><div class="grid" id="cards"></div></section>
    <section class="panel"><h2>WS 接口配置</h2><div class="table-wrap"><table><thead><tr><th>交易所</th><th>Host</th><th>端口</th><th>路径</th><th>操作</th></tr></thead><tbody id="wsRows"></tbody></table></div></section>
    <section class="panel"><h2>进程 / ETS 状态</h2><div class="table-wrap"><table><thead><tr><th>交易所</th><th>WS 地址</th><th>WS 启用</th><th>WS 已连接</th><th>WS 状态</th><th>本地订阅</th><th>资金费行数</th><th>最近刷新</th><th>错误</th></tr></thead><tbody id="processRows"></tbody></table></div></section>
    <section class="panel"><h2>套利机会</h2><div class="table-wrap"><table><thead><tr><th>币种</th><th>类型</th><th>方式</th><th>做多交易所</th><th>做空交易所</th><th>名义仓位</th><th>净回报率</th><th>预期利润</th><th>资金费差</th><th>价格差</th><th>结算倒计时</th></tr></thead><tbody id="opRows"></tbody></table></div></section>
    <section class="panel"><h2>模拟盘持仓</h2><div class="table-wrap"><table><thead><tr><th>币种</th><th>做多</th><th>做空</th><th>名义仓位</th><th>多头价格</th><th>空头价格</th><th>当前浮盈</th><th>预期盈利</th><th>开仓时间</th></tr></thead><tbody id="positionRows"></tbody></table></div></section>
    <section class="panel"><h2>记录</h2><div class="tabs"><button id="tabLogs" class="active" onclick="setLogTab('trades')">成交记录</button><button id="tabSkipped" onclick="setLogTab('skipped')">未执行记录</button><button id="tabLive" onclick="setLogTab('live')">实盘请求</button></div><div class="table-wrap"><table><thead><tr><th>时间</th><th>动作</th><th>币种</th><th>做多</th><th>做空</th><th>名义仓位</th><th>盈亏</th><th>状态/原因</th></tr></thead><tbody id="logRows"></tbody></table></div></section>
  </main>
  <script>
    let lastState={},logTab='trades';const $=id=>document.getElementById(id);const n=v=>Number(v||0);const money=v=>n(v).toFixed(2)+'U';const pct=v=>(n(v)*100).toFixed(4)+'%';const cls=v=>n(v)>=0?'pos':'neg';
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    async function api(path,opt={}){const r=await fetch(path,{headers:{'content-type':'application/json'},...opt});if(!r.ok)throw new Error(await r.text());return await r.json()}
    function payload(){let p=['capital_usdt','execution_notional_usdt','max_position_pct','min_funding_rate','min_price_gap_rate','max_basis_rate','min_execution_profit_usdt','limit'].reduce((a,k)=>(a[k]=n($(k).value),a),{});p.account_mode=$('account_mode').value;return p}
    function setStatus(s){$('status').textContent=s}function card(k,v,c=''){return `<div class="card"><div class="label">${k}</div><div class="value ${c}">${v}</div></div>`}
    function renderCards(proc,state,live){const ets=proc.ets||{},acc=proc.account||{},ex=proc.executor||{},sw=proc.symbol_watcher||{},watched=(sw.exchanges||[]).reduce((a,x)=>a+n(x.symbols),0);$('cards').innerHTML=[card('模拟权益',money(state.equity??acc.equity),cls(state.equity??acc.equity)),card('模拟余额',money(state.balance??acc.balance)),card('当前持仓',(state.positions||[]).length),card('实盘启用',String(live.enabled)),card('开仓执行单',(ex.orders||[]).length),card('平仓执行单',(ex.close_orders||[]).length),card('监听币种',watched),card('ETS 行情',ets.tickers||0),card('ETS 资金费',ets.funding||0)].join('')}
    function renderWsConfig(cfg){$('wsRows').innerHTML=(cfg.exchanges||[]).map(e=>`<tr><td>${esc(e.id)}</td><td><input id="ws_host_${esc(e.id)}" value="${esc(e.ws_host||'')}"></td><td><input id="ws_port_${esc(e.id)}" value="${esc(e.ws_port||443)}"></td><td><input id="ws_path_${esc(e.id)}" value="${esc(e.ws_path||'/')}"></td><td><button onclick="saveWs('${esc(e.id)}')">保存并重连</button></td></tr>`).join('')||'<tr><td colspan="5">暂无交易所配置。</td></tr>'}
    function renderProcesses(proc){$('processRows').innerHTML=(proc.exchanges||[]).map(e=>{const t=e.ticker||{},f=e.funding||{};return `<tr><td>${esc(e.exchange)}</td><td>${esc(t.ws_url||'-')}</td><td>${esc(t.ws_enabled)}</td><td class="${t.ws_connected?'pos':'warn'}">${esc(t.ws_connected)}</td><td>${esc(t.ws_status||'-')}</td><td>${(t.subscriptions||[]).length}</td><td>${esc(f.last_count??'-')}</td><td>${esc(f.last_refresh_ms??'-')}</td><td>${esc(t.ws_error||f.last_error||'-')}</td></tr>`}).join('')||'<tr><td colspan="9">暂无进程状态。</td></tr>'}
    function renderOps(ops){$('opRows').innerHTML=(ops||[]).map(o=>`<tr><td>${esc(o.symbol)}</td><td>${esc(o.opportunity_type)}</td><td>${esc(o.method)}</td><td>${esc(o.long_exchange)}</td><td>${esc(o.short_exchange)}</td><td>${money(o.notional_usdt)}</td><td class="${cls(o.expected_net_return)}">${pct(o.expected_net_return)}</td><td class="${cls(o.estimated_net_profit_usdt)}">${money(o.estimated_net_profit_usdt)}</td><td>${pct(o.funding_edge)}</td><td>${pct(o.price_gap_rate)}</td><td>${esc(o.settlement_countdown||'-')}</td></tr>`).join('')||'<tr><td colspan="11">暂无套利机会。</td></tr>'}
    function renderPositions(state){$('positionRows').innerHTML=(state.positions||[]).map(p=>`<tr><td>${esc(p.symbol)}</td><td>${esc(p.long_exchange)}</td><td>${esc(p.short_exchange)}</td><td>${money(p.notional_usdt||p.notional)}</td><td>${esc(p.long_current_price??p.long_entry_price??'-')}</td><td>${esc(p.short_current_price??p.short_entry_price??'-')}</td><td class="${cls(p.unrealized_pnl)}">${money(p.unrealized_pnl)}</td><td class="${cls(p.expected_net_profit)}">${money(p.expected_net_profit)}</td><td>${esc(p.opened_at??'-')}</td></tr>`).join('')||'<tr><td colspan="9">暂无持仓。</td></tr>'}
    function setLogTab(tab){logTab=tab;$('tabLogs').className=tab==='trades'?'active':'';$('tabSkipped').className=tab==='skipped'?'active':'';$('tabLive').className=tab==='live'?'active':'';renderLogs(lastState)}
    function renderLogs(state){let logs=logTab==='live'?(state.live_logs||[]):(state.logs||[]);if(logTab==='skipped')logs=logs.filter(x=>String(x.action||'').includes('skip'));if(logTab==='trades')logs=logs.filter(x=>!String(x.action||'').includes('skip'));$('logRows').innerHTML=logs.slice(0,200).map(x=>`<tr><td>${esc(x.time||x.ts_ms||'-')}</td><td>${esc(x.action)}</td><td>${esc(x.symbol)}</td><td>${esc(x.long_exchange)}</td><td>${esc(x.short_exchange)}</td><td>${money(x.notional_usdt||x.notional)}</td><td class="${cls(x.net_pnl)}">${money(x.net_pnl)}</td><td>${esc(x.status||x.reason||'-')}</td></tr>`).join('')||'<tr><td colspan="8">暂无记录。</td></tr>'}
    async function refreshAll(){try{setStatus('正在刷新...');const [proc,state,exec,live,cfg]=await Promise.all([api('/api/processes'),api('/api/funding/state'),api('/api/executor/state'),api('/api/live/state'),api('/api/config')]);proc.executor=exec;state.live_logs=live.logs||[];lastState=state;renderCards(proc,state,live);renderWsConfig(cfg);renderProcesses(proc);renderOps(exec.last_opportunities||[]);renderPositions(state);renderLogs(state);setStatus('已刷新。')}catch(e){setStatus('刷新失败：'+e.message)}}
    async function saveWs(id){try{setStatus('正在保存 WS 接口...');await api('/api/config/exchange/ws',{method:'POST',body:JSON.stringify({exchange:id,ws_host:$('ws_host_'+id).value,ws_port:n($('ws_port_'+id).value),ws_path:$('ws_path_'+id).value})});await refreshAll();setStatus('WS 接口已保存，已请求重连。')}catch(e){setStatus('保存 WS 失败：'+e.message)}}
    async function scanOnce(){try{setStatus('正在扫描 ETS...');const r=await api('/api/funding/scan',{method:'POST',body:JSON.stringify(payload())});lastState=r.paper_account||{};renderOps(r.opportunities||[]);renderPositions(lastState);renderLogs(lastState);await refreshAll();setStatus(`扫描完成：命中 ${(r.opportunities||[]).length} 个机会。`)}catch(e){setStatus('扫描失败：'+e.message)}}
    async function resetPaper(){try{setStatus('正在重置模拟盘...');await api('/api/funding/paper/reset',{method:'POST',body:JSON.stringify({capital_usdt:n($('capital_usdt').value)})});await refreshAll();setStatus('模拟盘已重置。')}catch(e){setStatus('重置失败：'+e.message)}}
    refreshAll();setInterval(refreshAll,5000);
  </script>
</body>
</html>
